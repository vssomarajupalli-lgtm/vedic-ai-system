version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vedic_ai_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/main.py:/app/main.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time variable for Vite to know where the API is
        - VITE_API_URL=http://localhost:8000/api/v1
    container_name: vedic_ai_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
